databases:
  # --- Free PostgreSQL Database ---
  - name: joyverse-db
    plan: free
    databaseName: joyverse
    user: joyverse_user

services:
  # --- Node.js Backend ---
  - type: web
    name: joyverse-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: joyverse-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FLASK_API_URL
        sync: false
      - key: NODE_ENV
        value: production

  # --- Flask AI Model Service ---
  - type: web
    name: joyverse-ai-model
    runtime: python
    plan: free
    buildCommand: cd AImodel && pip install -r requirements.txt
    startCommand: cd AImodel && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # --- React Frontend (Static Site) ---
  - type: static
    name: joyverse-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
